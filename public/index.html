<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeChat</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a33;
      --accent: #7c6af7;
      --accent2: #f7416a;
      --green: #3fdf9f;
      --text: #e8e8f0;
      --muted: #666680;
      --msg-own: #1e1a36;
      --msg-other: #1a1a22;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #onlineCount {
      font-size: 0.8rem;
      color: var(--green);
      background: rgba(63, 223, 159, 0.1);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(63, 223, 159, 0.25);
      font-family: 'Space Mono', monospace;
    }

    #myUsername {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
    }

    #themeToggle, #notifToggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    #themeToggle:hover, #notifToggle:hover { background: var(--accent); color: white; }
    #notifToggle.notif-on { border-color: var(--green); color: var(--green); }
    #notifToggle.notif-on:hover { background: var(--green); color: #000; }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width 0.3s;
    }

    .sidebar-title {
      padding: 16px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid var(--border);
    }

    #userList {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.9rem;
    }
    .user-item:hover { background: var(--surface2); }

    .user-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .user-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      margin-left: auto;
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--green);
    }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── MESSAGES ── */
    .msg-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      animation: msgIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-wrapper.own { align-self: flex-end; align-items: flex-end; }
    .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }

    .msg-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 3px;
      font-family: 'Space Mono', monospace;
      display: flex; gap: 6px; align-items: center;
    }

    .msg-meta .sender { color: var(--accent); font-weight: 700; }
    .msg-wrapper.own .msg-meta .sender { color: var(--accent2); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }

    .msg-wrapper.own .msg-bubble {
      background: var(--msg-own);
      border: 1px solid rgba(124,106,247,0.25);
      border-bottom-right-radius: 4px;
    }

    .msg-wrapper.other .msg-bubble {
      background: var(--msg-other);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-bubble.private {
      background: rgba(247, 65, 106, 0.1) !important;
      border-color: rgba(247, 65, 106, 0.35) !important;
    }

    .private-badge {
      font-size: 0.65rem;
      background: var(--accent2);
      color: white;
      padding: 1px 6px;
      border-radius: 20px;
      margin-left: 4px;
    }

    /* emoji reactions */
    .msg-reactions {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .reaction-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 7px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .reaction-btn:hover { background: var(--accent); border-color: var(--accent); }

    .react-picker {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      gap: 6px;
      flex-direction: row;
      font-size: 1.1rem;
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .react-picker.visible { display: flex; }

    .react-emoji {
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .react-emoji:hover { background: var(--border); }

    /* system messages */
    .sys-msg {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
      padding: 4px 0;
      font-family: 'Space Mono', monospace;
    }

    /* date divider */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .date-divider span {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      white-space: nowrap;
    }

    /* typing indicator */
    #typingZone {
      padding: 6px 20px;
      min-height: 26px;
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      font-family: 'Space Mono', monospace;
    }

    .typing-dots span {
      display: inline-block;
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .reply-preview {
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      padding: 6px 10px;
      margin-bottom: 8px;
      border-radius: 0 8px 8px 0;
      font-size: 0.8rem;
      color: var(--muted);
      display: none;
      align-items: center;
      justify-content: space-between;
    }
    .reply-preview.visible { display: flex; }

    .reply-cancel {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 1rem; padding: 0 4px;
    }
    .reply-cancel:hover { color: var(--accent2); }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #msgInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 16px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.92rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    #msgInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.12);
    }
    #msgInput::placeholder { color: var(--muted); }

    .icon-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--accent); border-color: var(--accent); }

    #sendBtn {
      padding: 11px 20px;
      border-radius: var(--radius);
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #sendBtn:hover { opacity: 0.9; }
    #sendBtn:active { transform: scale(0.96); }

    /* emoji picker overlay */
    #emojiPickerOverlay {
      display: none;
      position: fixed;
      bottom: 90px; right: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      z-index: 100;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      width: 240px;
    }
    #emojiPickerOverlay.visible { display: block; }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
    }

    .ep-emoji {
      font-size: 1.2rem;
      cursor: pointer;
      text-align: center;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.1s;
    }
    .ep-emoji:hover { background: var(--surface2); }

    /* private modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      width: 380px;
      max-width: 90vw;
      animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--accent2);
    }

    .modal-box select, .modal-box textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 12px;
    }
    .modal-box textarea { resize: vertical; min-height: 80px; }
    .modal-box select:focus, .modal-box textarea:focus { border-color: var(--accent2); }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    .modal-btn {
      padding: 9px 18px;
      border-radius: 10px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.88rem;
      transition: opacity 0.2s;
    }
    .modal-btn:hover { opacity: 0.85; }
    .modal-btn.primary { background: var(--accent2); color: white; }
    .modal-btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    /* toast */
    #toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 300;
      font-family: 'Space Mono', monospace;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* unread badge */
    .unread-badge {
      background: var(--accent2);
      color: white;
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 10px;
      font-family: 'Space Mono', monospace;
    }

    /* light theme */
    body.light {
      --bg: #f0f0f5;
      --surface: #ffffff;
      --surface2: #f4f4f8;
      --border: #dcdce8;
      --text: #1a1a2e;
      --muted: #8888a8;
      --msg-own: #ede9ff;
      --msg-other: #f4f4f8;
    }

    /* scrollbar for sidebar */
    #userList::-webkit-scrollbar { width: 3px; }
    #userList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* mobile */
    @media (max-width: 600px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">⚡ VibeChat</div>
    <div class="header-meta">
      <span id="onlineCount">0 online</span>
      <span id="myUsername"></span>
      <button id="notifToggle" title="Enable notifications">🔔</button>
      <button id="themeToggle" title="Toggle theme">🌙</button>
    </div>
  </header>

  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-title">Online Users</div>
      <div id="userList"></div>
    </div>

    <!-- CHAT -->
    <div class="chat-area">
      <div id="messages"></div>
      <div id="typingZone"></div>

      <!-- INPUT -->
      <div class="input-area">
        <div class="reply-preview" id="replyPreview">
          <span id="replyText">Replying to…</span>
          <button class="reply-cancel" id="cancelReply">✕</button>
        </div>
        <div class="input-row">
          <button class="icon-btn" id="emojiToggle" title="Emoji">😊</button>
          <input id="msgInput" type="text" placeholder="Say something…" autocomplete="off" />
          <button class="icon-btn" id="privateMsgBtn" title="Private message">🔒</button>
          <button id="sendBtn">Send ↗</button>
        </div>
      </div>
    </div>
  </div>

  <!-- EMOJI PICKER -->
  <div id="emojiPickerOverlay">
    <div class="emoji-grid" id="emojiGrid"></div>
  </div>

  <!-- PRIVATE MESSAGE MODAL -->
  <div class="modal-overlay" id="privateModal">
    <div class="modal-box">
      <div class="modal-title">🔒 Send Private Message</div>
      <select id="pmUserSelect">
        <option value="">— Select a user —</option>
      </select>
      <textarea id="pmText" placeholder="Your private message…"></textarea>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="pmCancel">Cancel</button>
        <button class="modal-btn primary" id="pmSend">Send</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- Socket.io -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── STATE ──
    const socket = io();
    let myUsername = '';
    let mySocketId = '';
    let replyTo = null;
    let typingTimer = null;
    let isTyping = false;
    let activeUsers = {};  // socketId -> username
    let msgCount = 0;
    let isLightTheme = false;

    const EMOJIS = ['😀','😂','❤️','🔥','👍','🎉','😎','🤔','😢','😡','💯','✨','🙌','👀','💀','🥳','😴','🤯','🫡','💬','⚡','🌙','🦋','🎵'];

    // ── DOM ──
    const messagesEl   = document.getElementById('messages');
    const msgInput     = document.getElementById('msgInput');
    const sendBtn      = document.getElementById('sendBtn');
    const userListEl   = document.getElementById('userList');
    const typingZone   = document.getElementById('typingZone');
    const onlineCount  = document.getElementById('onlineCount');
    const myUsernameEl = document.getElementById('myUsername');
    const themeToggle  = document.getElementById('themeToggle');
    const emojiToggle  = document.getElementById('emojiToggle');
    const emojiPicker  = document.getElementById('emojiPickerOverlay');
    const emojiGrid    = document.getElementById('emojiGrid');
    const privateMsgBtn= document.getElementById('privateMsgBtn');
    const privateModal = document.getElementById('privateModal');
    const pmCancel     = document.getElementById('pmCancel');
    const pmSend       = document.getElementById('pmSend');
    const pmUserSelect = document.getElementById('pmUserSelect');
    const pmText       = document.getElementById('pmText');
    const replyPreview = document.getElementById('replyPreview');
    const replyTextEl  = document.getElementById('replyText');
    const cancelReply  = document.getElementById('cancelReply');
    const toastEl      = document.getElementById('toast');

    // ── INIT ──
    function init() {
      myUsername = prompt('Enter your username:') || 'Anonymous';
      myUsernameEl.textContent = '@' + myUsername;
      socket.emit('new-user', myUsername);

      // Build emoji grid
      EMOJIS.forEach(e => {
        const span = document.createElement('span');
        span.className = 'ep-emoji';
        span.textContent = e;
        span.onclick = () => { msgInput.value += e; msgInput.focus(); };
        emojiGrid.appendChild(span);
      });
    }
    init();

    // ── TOAST ──
    function showToast(msg, duration = 2500) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    // ── SCROLL ──
    function scrollDown() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── DATE DIVIDER ──
    let lastDate = '';
    function maybeAddDateDivider() {
      const today = new Date().toLocaleDateString('en-IN', { weekday:'long', month:'short', day:'numeric' });
      if (today !== lastDate) {
        lastDate = today;
        const div = document.createElement('div');
        div.className = 'date-divider';
        div.innerHTML = `<span>${today}</span>`;
        messagesEl.appendChild(div);
      }
    }

    // ── RENDER MESSAGES ──
    function addSystemMsg(text) {
      const p = document.createElement('p');
      p.className = 'sys-msg';
      p.textContent = text;
      messagesEl.appendChild(p);
      scrollDown();
    }

    function addMessage({ sender, message, timestamp, isOwn, isPrivate, replyContext, msgId }) {
      maybeAddDateDivider();
      msgCount++;
      const id = msgId || 'msg-' + msgCount;

      const wrapper = document.createElement('div');
      wrapper.className = `msg-wrapper ${isOwn ? 'own' : 'other'}`;
      wrapper.dataset.msgId = id;

      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.innerHTML = `<span class="sender">${isOwn ? 'You' : sender}</span><span>${timestamp}</span>${isPrivate ? '<span class="private-badge">private</span>' : ''}`;

      const bubble = document.createElement('div');
      bubble.className = `msg-bubble${isPrivate ? ' private' : ''}`;

      if (replyContext) {
        const replyDiv = document.createElement('div');
        replyDiv.style.cssText = `font-size:0.75rem;color:var(--muted);border-left:2px solid var(--accent);padding-left:8px;margin-bottom:6px;`;
        replyDiv.textContent = '↩ ' + replyContext;
        bubble.appendChild(replyDiv);
      }

      const msgText = document.createElement('span');
      msgText.textContent = message;
      bubble.appendChild(msgText);

      // Reaction picker (on bubble hover)
      const reactPicker = document.createElement('div');
      reactPicker.className = 'react-picker';
      ['👍','❤️','😂','😮','😢','🔥'].forEach(emoji => {
        const span = document.createElement('span');
        span.className = 'react-emoji';
        span.textContent = emoji;
        span.onclick = (e) => {
          e.stopPropagation();
          addReaction(wrapper, emoji);
          reactPicker.classList.remove('visible');
        };
        reactPicker.appendChild(span);
      });
      bubble.appendChild(reactPicker);

      const reactionsEl = document.createElement('div');
      reactionsEl.className = 'msg-reactions';

      bubble.addEventListener('dblclick', () => reactPicker.classList.toggle('visible'));
      bubble.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        // Right click = reply
        replyTo = { id, sender, text: message };
        replyTextEl.textContent = `Replying to ${sender}: ${message.slice(0,40)}${message.length>40?'…':''}`;
        replyPreview.classList.add('visible');
        msgInput.focus();
      });

      wrapper.appendChild(meta);
      wrapper.appendChild(bubble);
      wrapper.appendChild(reactionsEl);
      messagesEl.appendChild(wrapper);
      scrollDown();
    }

    function addReaction(wrapper, emoji) {
      const reactionsEl = wrapper.querySelector('.msg-reactions');
      // Check if already there
      const existing = [...reactionsEl.querySelectorAll('.reaction-btn')].find(b => b.dataset.emoji === emoji);
      if (existing) {
        existing.dataset.count = +existing.dataset.count + 1;
        existing.textContent = emoji + ' ' + existing.dataset.count;
      } else {
        const btn = document.createElement('button');
        btn.className = 'reaction-btn';
        btn.dataset.emoji = emoji;
        btn.dataset.count = 1;
        btn.textContent = emoji + ' 1';
        reactionsEl.appendChild(btn);
      }
    }

    // ── SEND ──
    function sendMessage() {
      const msg = msgInput.value.trim();
      if (!msg) return;

      const payload = {
        message: msg,
        replyTo: replyTo ? replyTo.text : null
      };
      socket.emit('user-message', payload);

      msgInput.value = '';
      replyTo = null;
      replyPreview.classList.remove('visible');
      socket.emit('stop-typing');
      isTyping = false;
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

    // ── TYPING ──
    msgInput.addEventListener('input', () => {
      if (!isTyping) { socket.emit('typing'); isTyping = true; }
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        socket.emit('stop-typing');
        isTyping = false;
      }, 2000);
    });

    // ── EMOJI PICKER ──
    emojiToggle.addEventListener('click', () => emojiPicker.classList.toggle('visible'));
    document.addEventListener('click', e => {
      if (!emojiPicker.contains(e.target) && e.target !== emojiToggle)
        emojiPicker.classList.remove('visible');
    });

    // ── THEME TOGGLE ──
    themeToggle.addEventListener('click', () => {
      isLightTheme = !isLightTheme;
      document.body.classList.toggle('light', isLightTheme);
      themeToggle.textContent = isLightTheme ? '☀️' : '🌙';
    });

    // ── PRIVATE MSG ──
    privateMsgBtn.addEventListener('click', () => {
      // Populate user select
      pmUserSelect.innerHTML = '<option value="">— Select a user —</option>';
      Object.entries(activeUsers).forEach(([id, name]) => {
        if (id !== socket.id) {
          const opt = document.createElement('option');
          opt.value = id;
          opt.textContent = name;
          pmUserSelect.appendChild(opt);
        }
      });
      privateModal.classList.add('visible');
    });

    pmCancel.addEventListener('click', () => privateModal.classList.remove('visible'));
    pmSend.addEventListener('click', () => {
      const targetId = pmUserSelect.value;
      const msg = pmText.value.trim();
      if (!targetId || !msg) { showToast('⚠️ Select a user and type a message'); return; }
      socket.emit('private-message', { targetSocketId: targetId, message: msg });
      addMessage({
        sender: 'You → ' + activeUsers[targetId],
        message: msg,
        timestamp: new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }),
        isOwn: true,
        isPrivate: true
      });
      pmText.value = '';
      privateModal.classList.remove('visible');
      showToast('🔒 Private message sent!');
    });

    // Click user in sidebar → open DM
    userListEl.addEventListener('click', e => {
      const item = e.target.closest('.user-item');
      if (!item || !item.dataset.socketId) return;
      const targetId = item.dataset.socketId;
      if (targetId === socket.id) return;
      pmUserSelect.value = targetId;
      privateModal.classList.add('visible');
    });

    // Cancel reply
    cancelReply.addEventListener('click', () => {
      replyTo = null;
      replyPreview.classList.remove('visible');
    });

    // ── NOTIFICATIONS ──
    const notifToggle = document.getElementById('notifToggle');
    let notifsEnabled = false;
    let unreadCount = 0;
    const originalTitle = document.title;

    // Web Audio API — generate beep sound without any file
    function playBeep(type = 'message') {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'message') {
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.18, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.18);
        } else if (type === 'join') {
          // Two-tone ascending chime
          const osc2 = ctx.createOscillator();
          const gain2 = ctx.createGain();
          osc2.connect(gain2);
          gain2.connect(ctx.destination);

          osc.frequency.value = 523;
          gain.gain.setValueAtTime(0.12, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.15);

          osc2.frequency.value = 784;
          gain2.gain.setValueAtTime(0.001, ctx.currentTime + 0.1);
          gain2.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.18);
          gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
          osc2.start(ctx.currentTime + 0.1);
          osc2.stop(ctx.currentTime + 0.35);
        } else if (type === 'private') {
          // Double ping for private
          [0, 0.18].forEach(delay => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = 1046;
            g.gain.setValueAtTime(0.15, ctx.currentTime + delay);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.14);
            o.start(ctx.currentTime + delay);
            o.stop(ctx.currentTime + delay + 0.14);
          });
        }
      } catch(e) { /* AudioContext not available */ }
    }

    // Update tab title with unread count
    function updateTabTitle() {
      if (unreadCount > 0) {
        document.title = `(${unreadCount}) ${originalTitle}`;
      } else {
        document.title = originalTitle;
      }
    }

    // Send a browser push notification
    function sendPushNotif(title, body, type = 'message') {
      if (!notifsEnabled || Notification.permission !== 'granted') return;
      if (document.hasFocus()) return; // Only when tab is not focused

      const icons = { message: '💬', private: '🔒', join: '👋', leave: '👋' };
      new Notification(`${icons[type] || '💬'} ${title}`, {
        body,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">⚡</text></svg>',
        tag: 'vibechat-' + type,
        renotify: type === 'message',
        silent: true // We handle sound ourselves
      });
    }

    // Main function called on every incoming event
    function handleIncomingNotif(title, body, type = 'message') {
      // Sound — always play if page is not focused, or for private always
      if (!document.hasFocus() || type === 'private') {
        playBeep(type);
      }

      // Unread counter — increment when tab not focused
      if (!document.hasFocus()) {
        unreadCount++;
        updateTabTitle();
      }

      // Push notification
      sendPushNotif(title, body, type);
    }

    // Reset unread on focus
    window.addEventListener('focus', () => {
      unreadCount = 0;
      updateTabTitle();
    });

    // Request notification permission + toggle
    async function requestAndEnable() {
      if (!('Notification' in window)) {
        showToast('❌ Browser notifications not supported');
        return;
      }
      if (Notification.permission === 'denied') {
        showToast('🚫 Notifications blocked — allow in browser settings');
        return;
      }
      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        notifsEnabled = true;
        notifToggle.classList.add('notif-on');
        notifToggle.title = 'Notifications ON — click to disable';
        showToast('🔔 Notifications enabled!');
        // Send a test push
        new Notification('⚡ VibeChat', { body: 'Notifications are now ON!', silent: true });
      } else {
        showToast('⚠️ Permission denied');
      }
    }

    notifToggle.addEventListener('click', () => {
      if (notifsEnabled) {
        notifsEnabled = false;
        notifToggle.classList.remove('notif-on');
        notifToggle.title = 'Enable notifications';
        showToast('🔕 Notifications disabled');
      } else {
        requestAndEnable();
      }
    });

    // ── SOCKET EVENTS ──
    socket.on('connect', () => { mySocketId = socket.id; });

    socket.on('message', data => {
      const isOwn = data.username === myUsername;
      addMessage({
        sender: data.username,
        message: data.message,
        timestamp: data.timestamp,
        isOwn,
        replyContext: data.replyTo || null
      });
      if (!isOwn) handleIncomingNotif(data.username, data.message, 'message');
    });

    socket.on('private-message', data => {
      addMessage({
        sender: data.username,
        message: data.message,
        timestamp: new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }),
        isOwn: false,
        isPrivate: true
      });
      showToast('🔒 Private message from ' + data.username);
      handleIncomingNotif('Private: ' + data.username, data.message, 'private');
    });

    socket.on('user-joined', msg => { addSystemMsg('👋 ' + msg); handleIncomingNotif('VibeChat', msg, 'join'); });
    socket.on('user-left',   msg => { addSystemMsg('👋 ' + msg); handleIncomingNotif('VibeChat', msg, 'leave'); });

    socket.on('user-typing', username => {
      typingZone.innerHTML = `<span style="margin-right:6px">${username} is typing</span><span class="typing-dots"><span></span><span></span><span></span></span>`;
    });
    socket.on('user-stopped-typing', () => { typingZone.innerHTML = ''; });

    socket.on('update-users', users => {
      // users is array of {id, name}
      activeUsers = {};
      users.forEach(u => { activeUsers[u.id] = u.name; });

      onlineCount.textContent = users.length + ' online';

      userListEl.innerHTML = '';
      users.forEach(u => {
        const colors = ['#7c6af7','#f7416a','#3fdf9f','#f7b341','#41b0f7'];
        const color = colors[u.name.charCodeAt(0) % colors.length];
        const item = document.createElement('div');
        item.className = 'user-item';
        item.dataset.socketId = u.id;
        item.innerHTML = `
          <div class="user-avatar" style="background:${color}22;color:${color}">${u.name[0].toUpperCase()}</div>
          <span style="font-size:0.85rem">${u.name}${u.id === mySocketId ? ' <span style="color:var(--muted);font-size:0.7rem">(you)</span>' : ''}</span>
          ${u.id !== mySocketId ? '<div class="user-dot"></div>' : ''}
        `;
        userListEl.appendChild(item);
      });

      // Refresh PM dropdown options
      pmUserSelect.innerHTML = '<option value="">— Select a user —</option>';
      users.forEach(u => {
        if (u.id !== mySocketId) {
          const opt = document.createElement('option');
          opt.value = u.id;
          opt.textContent = u.name;
          pmUserSelect.appendChild(opt);
        }
      });
    });
  </script>
</body>
</html>
